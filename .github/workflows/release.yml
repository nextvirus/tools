# 在 GitHub 托管的 Linux / Windows / macOS 上一键打 PyInstaller 包，并在推送版本 tag 时发布 Release。
name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system deps (tkinter + binutils)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends python3-tk tk binutils

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Package tools (fetch rembg models + PyInstaller)
        run: python scripts/package_tools.py

      - name: Create tarball
        run: tar -czf tools-linux-amd64.tar.gz -C dist tools

      - uses: actions/upload-artifact@v4
        with:
          name: tools-linux-amd64
          path: tools-linux-amd64.tar.gz

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Package tools (fetch rembg models + PyInstaller)
        run: python scripts/package_tools.py

      - name: Create zip
        shell: pwsh
        run: Compress-Archive -Path dist/tools -DestinationPath tools-windows-amd64.zip -Force

      - uses: actions/upload-artifact@v4
        with:
          name: tools-windows-amd64
          path: tools-windows-amd64.zip

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Python deps
        run: pip install -r requirements.txt

      - name: Package tools (fetch rembg models + PyInstaller)
        run: python scripts/package_tools.py

      - name: Zip .app
        run: cd dist && zip -ry ../tools-macos.zip tools.app

      - uses: actions/upload-artifact@v4
        with:
          name: tools-macos
          path: tools-macos.zip

  publish:
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag' && startsWith(github.ref_name, 'v')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: tools-linux-amd64
          path: release-assets
      - uses: actions/download-artifact@v4
        with:
          name: tools-windows-amd64
          path: release-assets
      - uses: actions/download-artifact@v4
        with:
          name: tools-macos
          path: release-assets

      - name: Collect binaries (artifact 单文件下载可能在子目录)
        run: |
          mkdir -p upload
          find release-assets -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp -v {} upload/ \;
          ls -la upload

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
